<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchToFriend</title>
    <link rel="icon" type="image/png" href="/brand-logo.png" />
    <script>
      (function () {
        try {
          var m = parseInt(localStorage.getItem('wtf_theme_mode') || '2', 10);
          var dark = m === 2 || (m === 0 && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
